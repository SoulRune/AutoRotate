name: Build

on:
  push:
    branches: [ master, main ]
    tags: [ '*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # Apple Silicon macOS (not Intel). The Xcode toolchain emits arm64e and lipo can merge
    # the arm64 + arm64e slices, so the package hooks system processes on A12+ devices too
    # (a Linux/arm64-only build can't).
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "version=$(grep '^Version:' control | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Install tooling
        run: |
          # ldid (fake-signing), dpkg (dpkg-deb packaging), GNU make (theos wants make 4+).
          brew install ldid dpkg make
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: theos-macos-v2

      - name: Set up Theos
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          if [ ! -x "$THEOS/bin/logos.pl" ]; then
            rm -rf "$THEOS"
            git clone --quiet --recursive https://github.com/theos/theos.git "$THEOS"
          fi
          # Xcode's iOS SDK ships private-framework headers but no link stubs, so the
          # prefs bundle fails to link against Preferences. Theos's patched SDK ships the
          # stubs (and headers), and Xcode's clang still emits arm64e against it
          if ! ls "$THEOS"/sdks/iPhoneOS*.sdk >/dev/null 2>&1; then
            rm -rf "$THEOS/sdks"
            git clone --quiet --depth=1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"

      # Each scheme is a separate stage; both carry arm64 + arm64e. Outputs collect into
      # dist/ and ship as one artifact.
      # Pin the SDK to the patched 16.5 from $THEOS/sdks. Without this, TARGET "latest"
      # resolves to Xcode's iOS 18 SDK (higher version), which has no Preferences link
      # stub. TARGET on the command line overrides both Makefiles, incl. the subproject.
      - name: Build rootless .deb (arm64 + arm64e)
        run: |
          rm -rf packages
          make clean || true
          make package FINALPACKAGE=1 ARCHS="arm64 arm64e" TARGET="iphone:clang:16.5:15.0"
          mkdir -p dist && cp packages/*.deb dist/

      - name: Build rootful .deb (arm64 + arm64e)
        run: |
          rm -rf packages
          make clean || true
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME= ARCHS="arm64 arm64e" TARGET="iphone:clang:16.5:15.0"
          cp packages/*.deb dist/

      - name: Upload combined archive
        uses: actions/upload-artifact@v4
        with:
          name: autorotate-builds-${{ steps.ver.outputs.version }}
          path: dist/
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.deb
          fail_on_unmatched_files: true
